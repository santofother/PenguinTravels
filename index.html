<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Penguin Travels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #0a0a23;
    --ink: #1a1a2e;
    --paper: #f4f4d6;
    --gold: #ffd23f;
    --pink: #ff6ec7;
    --teal: #4cd2ff;
    --green: #6bdc6b;
    --red: #ff5c5c;
    --shadow: #000;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }

  html, body {
    height: 100%;
    background: var(--bg-deep);
    font-family: 'Press Start 2P', monospace;
    color: var(--paper);
    overflow: hidden;
  }

  /* Scanline overlay */
  body::after {
    content: "";
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.18) 0px,
      rgba(0,0,0,0.18) 2px,
      transparent 2px,
      transparent 4px
    );
    pointer-events: none;
    z-index: 9999;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background: radial-gradient(circle at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  #game {
    width: 100vw; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }

  /* Pixel-art bordered panel */
  .panel {
    position: relative;
    background: var(--ink);
    color: var(--paper);
    width: min(1280px, 100%);
    height: min(960px, 95vh);
    padding: 24px;
    box-shadow:
      0 -6px 0 0 var(--paper),
      0 6px 0 0 var(--paper),
      -6px 0 0 0 var(--paper),
      6px 0 0 0 var(--paper),
      0 -12px 0 0 var(--ink),
      0 12px 0 0 var(--ink),
      -12px 0 0 0 var(--ink),
      12px 0 0 0 var(--ink),
      0 -12px 0 6px var(--paper),
      0 12px 0 6px var(--paper),
      -12px 0 0 6px var(--paper),
      12px 0 0 6px var(--paper);
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  .banner {
    text-align: center;
    font-size: 10px;
    color: var(--pink);
    background: #2b0a2b;
    padding: 6px 8px;
    margin: -24px -24px 14px -24px;
    border-bottom: 4px solid var(--pink);
    letter-spacing: 2px;
    animation: pulsePink 1.2s steps(2) infinite;
  }
  @keyframes pulsePink {
    0%, 100% { color: var(--pink); text-shadow: 2px 2px 0 #5a005a; }
    50% { color: #fff; text-shadow: 2px 2px 0 var(--pink); }
  }

  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; margin-bottom: 14px;
    border-bottom: 2px dashed var(--paper);
    padding-bottom: 10px;
    flex-wrap: wrap; gap: 8px;
  }
  .gameTitle { color: var(--gold); font-size: 12px; letter-spacing: 2px; }
  .coins { color: var(--gold); }
  .stops { color: var(--teal); }

  .scene {
    flex: 1;
    display: flex; flex-direction: column;
    overflow-y: auto;
    padding-right: 4px;
  }
  .scene::-webkit-scrollbar { width: 8px; }
  .scene::-webkit-scrollbar-track { background: #000; }
  .scene::-webkit-scrollbar-thumb { background: var(--paper); }

  .sceneArt {
    display: flex; align-items: center; justify-content: center;
    height: clamp(220px, 38vh, 360px);
    margin-bottom: 14px;
    background: var(--bg-deep);
    border: 4px solid var(--paper);
    position: relative;
    overflow: hidden;
  }

  .locationName {
    font-size: 12px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 10px;
    letter-spacing: 2px;
    text-shadow: 3px 3px 0 #000;
  }

  .flavor {
    font-size: 11px;
    line-height: 1.8;
    margin-bottom: 16px;
    padding: 10px;
    background: #0a0a1a;
    border-left: 4px solid var(--teal);
    min-height: 60px;
  }

  .choices {
    display: grid; gap: 10px;
    grid-template-columns: 1fr;
  }

  button.choice {
    font-family: inherit;
    font-size: 10px;
    background: var(--ink);
    color: var(--paper);
    padding: 12px 14px;
    border: 4px solid var(--paper);
    cursor: pointer;
    text-align: left;
    line-height: 1.6;
    transition: transform 0.05s steps(2);
    box-shadow: 4px 4px 0 0 var(--shadow);
  }
  button.choice:hover {
    background: var(--gold);
    color: var(--ink);
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 0 var(--shadow);
  }
  button.choice:active {
    transform: translate(2px, 2px);
    box-shadow: 0 0 0 0 var(--shadow);
  }
  button.choice.special { border-color: var(--pink); color: var(--pink); }
  button.choice.special:hover { background: var(--pink); color: #fff; }
  button.choice.puzzle { border-color: var(--gold); color: var(--gold); }

  /* TITLE SCREEN ============================================== */
  #title {
    text-align: center;
    padding: 30px 10px;
  }
  .bigTitle {
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 6px;
    text-shadow:
      4px 0 0 var(--pink),
      4px 4px 0 #5a005a,
      8px 8px 0 #000;
    margin: 30px 0 20px;
    animation: bob 1.2s steps(2) infinite;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  .subtitle {
    font-size: 10px;
    color: var(--teal);
    margin-bottom: 30px;
    letter-spacing: 2px;
  }
  .startBtn {
    font-family: inherit;
    font-size: 14px;
    padding: 16px 28px;
    background: var(--ink);
    color: var(--gold);
    border: 4px solid var(--gold);
    cursor: pointer;
    letter-spacing: 4px;
    box-shadow: 6px 6px 0 0 #000;
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink {
    0%, 50% { background: var(--ink); color: var(--gold); }
    51%, 100% { background: var(--gold); color: var(--ink); }
  }
  .startBtn:hover { transform: scale(1.05); }

  /* Character select */
  .charSelectRow {
    display: flex; gap: 20px; justify-content: center; margin: 10px 0 24px;
  }
  .charBtn {
    font-family: inherit; font-size: 10px;
    padding: 14px 16px; width: 130px;
    background: var(--ink); color: var(--paper);
    border: 4px solid var(--paper); cursor: pointer;
    letter-spacing: 2px; line-height: 1.8;
    box-shadow: 6px 6px 0 0 #000;
    transition: transform 0.05s steps(2);
    position: relative;
  }
  .charBtn:hover { transform: translate(-2px,-2px); box-shadow: 8px 8px 0 0 #000; background: var(--paper); color: var(--ink); }
  .charBtn.squidBtn { border-color: var(--pink); color: var(--pink); }
  .charBtn.squidBtn:hover { background: var(--pink); color: #fff; border-color: var(--pink); }
  .charSelectLabel { font-size: 9px; color: var(--teal); letter-spacing: 2px; margin-bottom: 8px; }

  .titleArt {
    height: 180px;
    position: relative;
    margin: 0 auto;
  }

  /* ====== CSS PIXEL PENGUINS ====== */
  .penguin {
    width: 48px; height: 64px;
    position: relative;
    display: inline-block;
    animation: waddle 0.8s steps(2) infinite;
  }
  @keyframes waddle {
    0%, 100% { transform: rotate(-4deg) translateY(0); }
    50% { transform: rotate(4deg) translateY(-2px); }
  }
  /* Body using box-shadow pixels at 4px units */
  .penguin .body {
    position: absolute;
    width: 4px; height: 4px;
    left: 22px; top: 30px;
    background: #000;
    box-shadow:
      /* head row */
      -8px -24px 0 #000, -4px -24px 0 #000, 0 -24px 0 #000, 4px -24px 0 #000, 8px -24px 0 #000,
      -12px -20px 0 #000, -8px -20px 0 #000, -4px -20px 0 #000, 0 -20px 0 #000, 4px -20px 0 #000, 8px -20px 0 #000, 12px -20px 0 #000,
      /* eyes */
      -8px -16px 0 #fff, -4px -16px 0 #000, 4px -16px 0 #fff, 8px -16px 0 #000,
      -12px -16px 0 #000, 12px -16px 0 #000,
      /* beak */
      -2px -12px 0 var(--gold), 2px -12px 0 var(--gold),
      -4px -12px 0 #000, -8px -12px 0 #000,
      4px -12px 0 #000, 8px -12px 0 #000,
      -12px -12px 0 #000, 12px -12px 0 #000,
      /* body outline */
      -16px -8px 0 #000, -12px -8px 0 #fff, -8px -8px 0 #fff, -4px -8px 0 #fff, 0 -8px 0 #fff, 4px -8px 0 #fff, 8px -8px 0 #fff, 12px -8px 0 #fff, 16px -8px 0 #000,
      -16px -4px 0 #000, -12px -4px 0 #fff, -8px -4px 0 #fff, -4px -4px 0 #fff, 0 -4px 0 #fff, 4px -4px 0 #fff, 8px -4px 0 #fff, 12px -4px 0 #fff, 16px -4px 0 #000,
      -16px 0 0 #000, -12px 0 0 #fff, -8px 0 0 #fff, -4px 0 0 #fff, 0 0 0 #fff, 4px 0 0 #fff, 8px 0 0 #fff, 12px 0 0 #fff, 16px 0 0 #000,
      -16px 4px 0 #000, -12px 4px 0 #fff, -8px 4px 0 #fff, -4px 4px 0 #fff, 0 4px 0 #fff, 4px 4px 0 #fff, 8px 4px 0 #fff, 12px 4px 0 #fff, 16px 4px 0 #000,
      -12px 8px 0 #000, -8px 8px 0 #fff, -4px 8px 0 #fff, 0 8px 0 #fff, 4px 8px 0 #fff, 8px 8px 0 #fff, 12px 8px 0 #000,
      /* feet */
      -8px 12px 0 var(--gold), -4px 12px 0 var(--gold), 4px 12px 0 var(--gold), 8px 12px 0 var(--gold);
  }
  .penguin.izzy .body { box-shadow:
      -8px -24px 0 #000, -4px -24px 0 #000, 0 -24px 0 #000, 4px -24px 0 #000, 8px -24px 0 #000,
      -12px -20px 0 #000, -8px -20px 0 #000, -4px -20px 0 #000, 0 -20px 0 #000, 4px -20px 0 #000, 8px -20px 0 #000, 12px -20px 0 #000,
      /* pink bow */
      -16px -24px 0 var(--pink), -16px -28px 0 var(--pink), -20px -24px 0 var(--pink),
      16px -24px 0 var(--pink), 16px -28px 0 var(--pink), 20px -24px 0 var(--pink),
      -8px -16px 0 #fff, -4px -16px 0 #000, 4px -16px 0 #fff, 8px -16px 0 #000,
      -12px -16px 0 #000, 12px -16px 0 #000,
      -2px -12px 0 var(--gold), 2px -12px 0 var(--gold),
      -4px -12px 0 #000, -8px -12px 0 #000,
      4px -12px 0 #000, 8px -12px 0 #000,
      -12px -12px 0 #000, 12px -12px 0 #000,
      -16px -8px 0 #000, -12px -8px 0 #fff, -8px -8px 0 #fff, -4px -8px 0 #fff, 0 -8px 0 #fff, 4px -8px 0 #fff, 8px -8px 0 #fff, 12px -8px 0 #fff, 16px -8px 0 #000,
      -16px -4px 0 #000, -12px -4px 0 var(--pink), -8px -4px 0 #fff, -4px -4px 0 #fff, 0 -4px 0 #fff, 4px -4px 0 #fff, 8px -4px 0 #fff, 12px -4px 0 var(--pink), 16px -4px 0 #000,
      -16px 0 0 #000, -12px 0 0 var(--pink), -8px 0 0 #fff, -4px 0 0 #fff, 0 0 0 #fff, 4px 0 0 #fff, 8px 0 0 #fff, 12px 0 0 var(--pink), 16px 0 0 #000,
      -16px 4px 0 #000, -12px 4px 0 #fff, -8px 4px 0 #fff, -4px 4px 0 #fff, 0 4px 0 #fff, 4px 4px 0 #fff, 8px 4px 0 #fff, 12px 4px 0 #fff, 16px 4px 0 #000,
      -12px 8px 0 #000, -8px 8px 0 #fff, -4px 8px 0 #fff, 0 8px 0 #fff, 4px 8px 0 #fff, 8px 8px 0 #fff, 12px 8px 0 #000,
      -8px 12px 0 var(--gold), -4px 12px 0 var(--gold), 4px 12px 0 var(--gold), 8px 12px 0 var(--gold);
  }

  .penguinPair {
    position: absolute;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 30px; align-items: end;
  }
  .heart {
    position: absolute;
    top: 30px; left: 50%;
    transform: translateX(-50%);
    color: var(--pink);
    font-size: 24px;
    animation: heartPop 1s steps(2) infinite;
  }
  @keyframes heartPop {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: 1; }
    50% { transform: translateX(-50%) scale(1.3); opacity: 0.7; }
  }

  /* Stars */
  .star {
    position: absolute;
    color: var(--paper);
    font-size: 8px;
    animation: twinkle 1.5s steps(2) infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* Scene background helpers */
  .bg-ice { background: linear-gradient(to bottom, #b3e5ff 0%, #b3e5ff 60%, #fff 60%, #fff 100%); }
  .bg-tokyo { background: linear-gradient(to bottom, #ff6ec7 0%, #ff6ec7 30%, #2b0a2b 30%, #2b0a2b 100%); }
  .bg-paris { background: linear-gradient(to bottom, #ff9f4a 0%, #ff6ec7 50%, #4a2b6e 100%); }
  .bg-egypt { background: linear-gradient(to bottom, #ffb84a 0%, #ffd23f 60%, #c98a3a 60%, #c98a3a 100%); }
  .bg-amazon { background: linear-gradient(to bottom, #4cd2ff 0%, #4cd2ff 30%, #1a5c1a 30%, #0a3a0a 100%); }
  .bg-iceland { background: linear-gradient(to bottom, #0a0a3a 0%, #2a1a6a 50%, #6bdc6b 80%, #fff 100%); }
  .bg-venice { background: linear-gradient(to bottom, #ff9f4a 0%, #ff6ec7 40%, #4cd2ff 60%, #1a5c8a 100%); }
  .bg-hawaii { background: linear-gradient(to bottom, #ffd23f 0%, #ff6ec7 40%, #4cd2ff 70%, #1a5c8a 100%); }
  .bg-everest { background: linear-gradient(to bottom, #6ec5ff 0%, #b3e5ff 60%, #fff 60%, #fff 100%); }
  .bg-nyc { background: linear-gradient(to bottom, #2b0a2b 0%, #4a2b6e 100%); }
  .bg-gbr { background: linear-gradient(to bottom, #4cd2ff 0%, #1a5c8a 60%, #0a2a4a 100%); }
  .bg-credits { background: linear-gradient(to bottom, #0a0a23 0%, #2b0a4a 100%); }

  /* Scene-specific pixel art structures */
  .pixelObject { position: absolute; }

  /* Igloo (Antarctica) */
  .igloo {
    width: 60px; height: 40px;
    bottom: 8px; left: 30%;
    background: #fff;
    border-radius: 60px 60px 0 0;
    box-shadow:
      0 0 0 4px #000,
      -10px 4px 0 #000,
      10px 4px 0 #000;
  }
  .igloo::before {
    content: ""; position: absolute;
    width: 16px; height: 18px;
    background: #1a1a2e;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 0 0 3px #000;
  }
  .snowflake {
    position: absolute;
    color: #fff;
    font-size: 10px;
    animation: fall 4s linear infinite;
  }
  @keyframes fall {
    from { transform: translateY(-20px); opacity: 1; }
    to { transform: translateY(220px); opacity: 0; }
  }

  /* Tokyo: torii gate */
  .torii {
    position: absolute;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 90px;
  }
  .torii::before {
    content: ""; position: absolute;
    width: 100px; height: 12px;
    background: var(--red);
    top: 0; left: -10px;
    box-shadow: 0 0 0 3px #000, 0 18px 0 var(--red), 0 18px 0 3px #000;
  }
  .torii::after {
    content: ""; position: absolute;
    width: 8px; height: 80px;
    background: var(--red);
    top: 10px; left: 12px;
    box-shadow: 60px 0 0 var(--red), 0 0 0 3px #000, 60px 0 0 3px #000;
  }
  .neon {
    position: absolute;
    top: 15px; right: 20px;
    color: var(--pink);
    font-size: 14px;
    animation: blinkFast 0.6s steps(2) infinite;
    text-shadow: 0 0 8px var(--pink);
  }
  @keyframes blinkFast {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0.3; }
  }

  /* Paris: Eiffel tower */
  .eiffel {
    position: absolute;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 40px solid transparent;
    border-right: 40px solid transparent;
    border-bottom: 130px solid #1a1a2e;
  }
  .eiffel::before {
    content: ""; position: absolute;
    width: 20px; height: 4px;
    background: #1a1a2e;
    bottom: -130px; left: -10px;
    box-shadow: 0 -30px 0 #1a1a2e, 0 -60px 0 -2px #1a1a2e;
  }
  .moon {
    position: absolute;
    top: 20px; right: 30px;
    width: 30px; height: 30px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 0 3px #000, inset -8px -2px 0 #d6d6c0;
  }

  /* Pyramid */
  .pyramid {
    position: absolute;
    bottom: 60px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 70px solid transparent;
    border-right: 70px solid transparent;
    border-bottom: 100px solid #c98a3a;
  }
  .pyramid::after {
    content: ""; position: absolute;
    width: 0; height: 0;
    border-left: 30px solid transparent;
    border-right: 30px solid transparent;
    border-bottom: 100px solid #e0a04a;
    bottom: -100px; left: -30px;
  }
  .sphinx { position: absolute; bottom: 60px; left: 20px; font-size: 32px; }
  .sun {
    position: absolute;
    top: 20px; right: 25px;
    width: 36px; height: 36px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 0 3px #ff9f4a, 0 0 20px var(--gold);
  }

  /* Amazon */
  .tree {
    position: absolute;
    bottom: 0; width: 30px; height: 80px;
    background: #5a3a1a;
  }
  .tree::before {
    content: ""; position: absolute;
    width: 60px; height: 60px;
    background: #1a5c1a;
    border-radius: 50%;
    top: -40px; left: -15px;
    box-shadow: 0 0 0 3px #000;
  }

  /* Iceland aurora */
  .aurora {
    position: absolute;
    top: 20px; left: 0; right: 0; height: 60px;
    background: linear-gradient(to right, transparent, #6bdc6b, var(--pink), #4cd2ff, transparent);
    opacity: 0.6;
    animation: shimmer 3s steps(4) infinite;
    filter: blur(3px);
  }
  @keyframes shimmer {
    0%, 100% { transform: skewY(-2deg); opacity: 0.5; }
    50% { transform: skewY(2deg); opacity: 0.8; }
  }

  /* Venice */
  .gondola {
    position: absolute;
    bottom: 50px; left: 50%;
    transform: translateX(-50%);
    width: 80px; height: 16px;
    background: #1a1a2e;
    border-radius: 0 0 40px 40px;
    box-shadow: 0 0 0 3px #000;
  }
  .gondola::before {
    content: ""; position: absolute;
    width: 4px; height: 30px;
    background: #5a3a1a;
    top: -30px; left: 70px;
  }

  /* Hawaii palm */
  .palm {
    position: absolute;
    bottom: 0; left: 30px;
    width: 8px; height: 80px;
    background: #5a3a1a;
  }
  .palm::before {
    content: "🌴";
    position: absolute;
    font-size: 50px;
    top: -50px; left: -22px;
  }
  .wave { position: absolute; bottom: 0; left: 0; right: 0; height: 30px; background: #1a5c8a; box-shadow: 0 -3px 0 #4cd2ff; }

  /* Everest */
  .mountain {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 130px solid #b3e5ff;
  }
  .mountain::after {
    content: ""; position: absolute;
    width: 0; height: 0;
    border-left: 40px solid transparent;
    border-right: 40px solid transparent;
    border-bottom: 50px solid #fff;
    bottom: -130px; left: -40px;
  }

  /* NYC skyline */
  .skyline {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 100px;
    background: #1a1a2e;
    box-shadow: inset 0 0 0 0 #000;
  }
  .building {
    position: absolute;
    bottom: 0;
    background: #2b1a4e;
    box-shadow: 0 0 0 2px #000;
  }
  .window {
    position: absolute;
    width: 4px; height: 4px;
    background: var(--gold);
    animation: flicker 2s steps(2) infinite;
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* GBR coral reef */
  .coral {
    position: absolute;
    bottom: 0;
    font-size: 30px;
  }
  .bubble {
    position: absolute;
    width: 8px; height: 8px;
    background: #fff;
    border-radius: 50%;
    opacity: 0.6;
    animation: rise 3s linear infinite;
  }
  @keyframes rise {
    from { bottom: 0; opacity: 0.6; }
    to { bottom: 200px; opacity: 0; }
  }

  /* Puzzle UI */
  .puzzleBox {
    background: #0a0a1a;
    padding: 12px;
    margin-bottom: 12px;
    border: 4px dashed var(--gold);
  }
  .puzzleBox p { font-size: 10px; line-height: 1.6; margin-bottom: 10px; color: var(--gold); }
  .puzzleInput {
    font-family: inherit;
    font-size: 12px;
    padding: 8px;
    background: var(--ink);
    color: var(--paper);
    border: 3px solid var(--paper);
    width: 100%;
    margin-bottom: 8px;
  }
  .puzzleInput:focus { outline: none; border-color: var(--gold); }

  /* === CUBE-ESCAPE STYLE PUZZLES === */
  .puzzleLayout {
    display: grid;
    grid-template-columns: minmax(0, 1.3fr) minmax(0, 1fr);
    gap: 18px;
    align-items: stretch;
    flex: 1;
    min-height: 0;
  }
  .puzzleLeft, .puzzleRight {
    display: flex; flex-direction: column;
    min-height: 0;
    overflow-y: auto;
    padding-right: 4px;
  }
  .puzzleLeft::-webkit-scrollbar,
  .puzzleRight::-webkit-scrollbar { width: 8px; }
  .puzzleLeft::-webkit-scrollbar-track,
  .puzzleRight::-webkit-scrollbar-track { background: #000; }
  .puzzleLeft::-webkit-scrollbar-thumb,
  .puzzleRight::-webkit-scrollbar-thumb { background: var(--paper); }
  @media (max-width: 900px) {
    .puzzleLayout { grid-template-columns: 1fr; }
    .puzzleLeft, .puzzleRight { overflow-y: visible; }
  }
  .escapeScene {
    position: relative;
    flex: 1;
    min-height: clamp(280px, 50vh, 520px);
    margin-bottom: 12px;
    border: 4px solid var(--gold);
    overflow: hidden;
    cursor: crosshair;
    box-shadow: inset 0 0 0 2px #000, 0 0 0 2px #000;
  }
  .escapeScene::after {
    content: "🔍 click around";
    position: absolute;
    bottom: 4px; right: 6px;
    font-size: 7px;
    color: var(--paper);
    opacity: 0.6;
    pointer-events: none;
    letter-spacing: 1px;
  }
  .hotspot {
    position: absolute;
    cursor: pointer;
    transform: translate(-50%, -50%);
    transition: filter 0.1s steps(2), transform 0.1s steps(2);
    user-select: none;
    line-height: 1;
    z-index: 4;
  }
  .hotspot:hover {
    transform: translate(-50%, -50%) scale(1.2);
    filter: drop-shadow(0 0 6px var(--gold));
  }
  .hotspot.found {
    pointer-events: none;
    opacity: 0.45;
    animation: foundPulse 0.6s steps(3);
  }
  @keyframes foundPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.6); filter: drop-shadow(0 0 14px var(--gold)); }
  }
  .discoveredBar {
    background: #0a0a1a;
    border: 3px solid var(--paper);
    padding: 8px;
    margin-bottom: 8px;
    min-height: 56px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .discoveredBar .empty {
    font-size: 9px;
    color: var(--paper);
    opacity: 0.5;
    margin: 0 auto;
  }
  .symBtn {
    font-family: inherit;
    font-size: 22px;
    padding: 4px 10px;
    background: var(--ink);
    color: var(--paper);
    border: 3px solid var(--gold);
    cursor: pointer;
    position: relative;
    line-height: 1;
  }
  .symBtn:hover { background: var(--gold); transform: translateY(-2px); }
  .symBtn:disabled { opacity: 0.35; cursor: not-allowed; }
  .symBtn .pos {
    position: absolute;
    top: -10px; right: -10px;
    font-size: 8px;
    background: var(--pink);
    color: #fff;
    padding: 2px 4px;
    border: 2px solid #000;
    line-height: 1;
  }
  .slotPad {
    display: flex; gap: 8px; justify-content: center;
    margin-bottom: 8px;
    background: #0a0a1a;
    border: 3px dashed var(--gold);
    padding: 10px;
  }
  .slot {
    width: 54px; height: 54px;
    border: 3px solid var(--paper);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    background: var(--ink);
    position: relative;
    cursor: pointer;
  }
  .slot::before {
    content: attr(data-num);
    position: absolute;
    top: -10px; left: -8px;
    font-size: 8px;
    color: var(--teal);
    background: #000;
    padding: 2px 4px;
    border: 2px solid var(--teal);
    line-height: 1;
  }
  .slot.filled { border-color: var(--gold); }
  .slot.filled:hover { background: #2b0a2b; }

  /* Inventory tool buttons (selectable) */
  .symBtn.tool {
    border-color: var(--teal);
    color: var(--teal);
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 4px 8px 6px;
  }
  .symBtn.tool:hover { background: var(--teal); color: var(--ink); }
  .symBtn.tool.selected {
    border-color: var(--pink);
    background: #3a0a3a;
    color: var(--pink);
    box-shadow: 0 0 12px var(--pink);
    animation: toolPulse 0.6s steps(2) infinite;
  }
  .symBtn.tool.selected:hover { background: var(--pink); color: #fff; }
  @keyframes toolPulse {
    0%, 100% { transform: translateY(-2px); }
    50% { transform: translateY(0); }
  }
  .symBtn .toolTag {
    position: static;
    transform: none;
    font-size: 7px;
    background: #000;
    color: var(--paper);
    padding: 2px 5px;
    border: 2px solid currentColor;
    line-height: 1;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  /* Sealed door visualization (Egypt) */
  .sealedDoor {
    position: absolute;
    left: 50%; bottom: 18%;
    transform: translateX(-50%);
    width: 56px; height: 78px;
    background: #5a3a1a;
    border: 3px solid #000;
    box-shadow: inset 0 0 0 4px #3a1a0a, 0 0 0 4px #2a1a0a;
    pointer-events: none;
    display: flex; align-items: center; justify-content: center;
    color: var(--gold);
    font-size: 8px;
    letter-spacing: 1px;
    writing-mode: vertical-rl;
  }

  /* Cracked-wall texture for hotspot */
  .hotspot.dusty {
    filter: grayscale(0.6) brightness(0.7) drop-shadow(0 0 4px #000);
  }

  /* ========= Egypt Tomb interior ========= */
  .tombInterior {
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg,
        rgba(0,0,0,0.18) 0 1px,
        transparent 1px 28px),
      repeating-linear-gradient(90deg,
        rgba(0,0,0,0.22) 0 1px,
        transparent 1px 44px),
      linear-gradient(to bottom, #1a1008 0%, #2e1f0a 60%, #1a1008 100%);
    pointer-events: none;
  }
  .tombFloor {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 18%;
    background:
      repeating-linear-gradient(90deg,
        rgba(0,0,0,0.4) 0 2px,
        transparent 2px 36px),
      linear-gradient(to bottom, #2a1a08 0%, #150a02 100%);
    box-shadow: inset 0 4px 0 rgba(0,0,0,0.6);
    pointer-events: none;
  }
  .torch {
    position: absolute;
    width: 22px; height: 22px;
    font-size: 18px;
    line-height: 1;
    text-align: center;
    z-index: 2;
    pointer-events: none;
    animation: torchFlicker 0.5s steps(3) infinite;
  }
  .torch::before {
    content: "";
    position: absolute;
    inset: -40px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,159,74,0.5) 0%, rgba(255,159,74,0.2) 40%, transparent 70%);
    pointer-events: none;
    animation: torchGlow 1.2s steps(4) infinite;
  }
  .torch.left { top: 6%; left: 33%; }
  .torch.right { top: 6%; right: 4%; }
  @keyframes torchFlicker {
    0%, 100% { filter: drop-shadow(0 0 4px #ff9f4a); transform: scale(1); }
    50% { filter: drop-shadow(0 0 9px #ffd23f); transform: scale(1.08); }
  }
  @keyframes torchGlow {
    0%, 100% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  /* The big sealed tomb door */
  .escapeDoor {
    position: absolute;
    left: 50%;
    bottom: 16%;
    transform: translateX(-50%);
    width: 28%;
    height: 70%;
    background:
      linear-gradient(90deg, #1a0f05 0%, #2a1a0a 48%, #000 50%, #2a1a0a 52%, #1a0f05 100%);
    border: 6px solid #6b4a1a;
    box-shadow:
      inset 0 0 0 3px #2a1a08,
      inset 0 0 30px rgba(0,0,0,0.8),
      0 0 0 2px #000,
      0 0 24px rgba(0,0,0,0.7);
    pointer-events: none;
    z-index: 1;
  }
  .escapeDoor .doorLabel {
    position: absolute;
    top: 4px; left: 0; right: 0;
    text-align: center;
    color: var(--gold);
    font-size: 7px;
    letter-spacing: 3px;
    text-shadow: 0 0 4px #000;
  }
  .escapeDoor .sigilRow {
    position: absolute;
    top: 18%; left: 0; right: 0;
    display: flex; justify-content: space-around;
    padding: 0 10%;
  }
  .escapeDoor .sigilSlot {
    width: 18px; height: 18px;
    border: 2px solid var(--gold);
    border-radius: 50%;
    background: rgba(0,0,0,0.6);
    box-shadow: inset 0 0 6px rgba(0,0,0,0.8);
  }

  /* Big dusty wall on left side */
  .tombWall {
    position: absolute;
    left: 0; top: 0;
    width: 30%;
    height: 82%;
    background:
      repeating-linear-gradient(0deg,
        rgba(0,0,0,0.3) 0 2px,
        transparent 2px 32px),
      repeating-linear-gradient(90deg,
        rgba(0,0,0,0.25) 0 2px,
        transparent 2px 48px),
      linear-gradient(to bottom, #3a2410 0%, #2a1a08 100%);
    border-right: 3px solid rgba(0,0,0,0.6);
    pointer-events: none;
    z-index: 1;
  }
  .tombWall .glyphGrid {
    position: absolute;
    inset: 12% 8%;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr);
    place-items: center;
    color: var(--gold);
    font-size: 22px;
    text-shadow: 0 0 6px rgba(255,159,74,0.6);
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  .tombWall .dustOverlay {
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg,
        rgba(255,255,255,0.04) 0 1px,
        transparent 1px 6px),
      rgba(180,160,120,0.55);
    opacity: 1;
    transition: opacity 1.2s ease;
    pointer-events: none;
  }
  .tombWall.wallRevealed .dustOverlay { opacity: 0; }
  .tombWall.wallRevealed .glyphGrid { opacity: 1; }

  /* Wall-mounted sundial */
  .sundialMount {
    position: absolute;
    left: 76%; top: 36%;
    width: 90px; height: 90px;
    z-index: 1;
    pointer-events: none;
  }
  .sundialMount svg { width: 100%; height: 100%; transition: filter 0.3s ease; }
  .sundialMount.maxed svg { animation: sundialPulse 1.2s steps(4) infinite; }
  @keyframes sundialPulse {
    0%, 100% { filter: drop-shadow(0 0 8px #ff9f4a) drop-shadow(0 0 16px #ffd23f); }
    50% { filter: drop-shadow(0 0 18px #fff) drop-shadow(0 0 28px #ffd23f); }
  }
  .sunBurst {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-size: 36px;
    pointer-events: none;
    animation: sunBurst 1.6s ease-out forwards;
  }
  @keyframes sunBurst {
    0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    60% { opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
  }

  /* Large transparent overlay hotspots (wall, sundial) */
  .hotspotOverlay {
    position: absolute;
    cursor: pointer;
    background: transparent;
    outline: 2px dashed transparent;
    transition: outline-color 0.15s, background 0.15s;
    z-index: 3;
  }
  .hotspotOverlay:hover {
    outline-color: rgba(255,210,63,0.4);
    background: rgba(255,210,63,0.06);
  }

  /* Sundial check / lock button */
  .sundialCheckBtn {
    position: absolute;
    left: 78%; top: 26%;
    width: 70px;
    padding: 3px 0;
    text-align: center;
    font-family: inherit;
    font-size: 7px;
    letter-spacing: 1px;
    background: #1a0f05;
    color: var(--gold);
    border: 2px solid var(--gold);
    cursor: pointer;
    user-select: none;
    z-index: 4;
    box-shadow: 0 0 8px rgba(0,0,0,0.6);
  }
  .sundialCheckBtn:hover {
    background: var(--gold);
    color: #1a0f05;
  }

  /* Silent overlay (clickable but no hover indicator) */
  .hotspotOverlay.silent:hover {
    outline-color: transparent;
    background: transparent;
  }

  /* ========= Amazon Alchemist's Hut ========= */
  .alchemyHut {
    position: absolute; inset: 0;
    background:
      repeating-linear-gradient(0deg,
        rgba(0,0,0,0.18) 0 1px,
        transparent 1px 22px),
      repeating-linear-gradient(90deg,
        rgba(0,0,0,0.15) 0 1px,
        transparent 1px 60px),
      linear-gradient(to bottom, #3a2208 0%, #5a3a18 55%, #2a1a08 100%);
    pointer-events: none;
  }
  .hutThatch {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 8%;
    background:
      repeating-linear-gradient(90deg,
        #2a1a08 0 6px,
        #4a2a10 6px 12px);
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.5);
    pointer-events: none;
  }
  .hutFloor {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 14%;
    background:
      repeating-linear-gradient(90deg,
        rgba(0,0,0,0.4) 0 2px,
        transparent 2px 40px),
      linear-gradient(to bottom, #2a1a08 0%, #150a02 100%);
    pointer-events: none;
  }
  .shelfRack {
    position: absolute;
    left: 4%; top: 28%;
    width: 42%; height: 38%;
    background:
      linear-gradient(to bottom, transparent 49%, #3a2208 49%, #3a2208 52%, transparent 52%),
      linear-gradient(180deg, rgba(0,0,0,0.3), rgba(0,0,0,0.3));
    border: 3px solid #2a1a08;
    box-shadow: inset 0 0 0 2px #5a3a18;
    pointer-events: none;
  }
  .cauldron {
    position: absolute;
    left: 50%; top: 60%;
    transform: translateX(-50%);
    width: 110px; height: 80px;
    background: #1a0f05;
    border: 4px solid #2a1a08;
    border-radius: 8px 8px 50% 50% / 8px 8px 40% 40%;
    box-shadow: 0 0 0 2px #000, 0 6px 14px rgba(0,0,0,0.7);
    z-index: 1;
    pointer-events: none;
  }
  .cauldronLiquid {
    position: absolute;
    left: 6px; top: 6px; right: 6px; bottom: 6px;
    border-radius: 6px 6px 50% 50% / 6px 6px 40% 40%;
    background: #4a2a08;
    transition: background 0.6s ease, box-shadow 0.4s ease;
    box-shadow: inset 0 0 14px rgba(0,0,0,0.7);
  }
  .cauldronLiquid[data-brew-step="1"] { background: #8a3a3a; box-shadow: inset 0 0 16px rgba(255,80,80,0.4); }
  .cauldronLiquid[data-brew-step="2"] { background: #6a2a8a; box-shadow: inset 0 0 18px rgba(180,80,255,0.4); }
  .cauldronLiquid[data-brew-step="3"] { background: #c98a3a; box-shadow: inset 0 0 20px rgba(255,210,63,0.5); }
  .cauldronLiquid[data-brew-step="4"] {
    background: linear-gradient(135deg, #ffd23f, #ff6ec7, #6bdc6b);
    box-shadow: inset 0 0 22px #fff, 0 0 24px #ffd23f;
    animation: brewGlow 1.2s steps(4) infinite;
  }
  .cauldronLiquid.curdled {
    background: #1a0a0a !important;
    box-shadow: inset 0 0 24px #6a0a0a !important;
  }
  @keyframes brewGlow {
    0%, 100% { filter: drop-shadow(0 0 8px #ffd23f); }
    50% { filter: drop-shadow(0 0 16px #ff6ec7); }
  }
  .cauldronFire {
    position: absolute;
    left: 50%; bottom: 18%;
    transform: translateX(-50%);
    font-size: 22px;
    line-height: 1;
    pointer-events: none;
    animation: torchFlicker 0.5s steps(3) infinite;
    z-index: 0;
  }
  .scrollPaper {
    position: absolute;
    left: 66%; top: 78%;
    width: 38px; height: 26px;
    background: #d6c090;
    border: 2px solid #5a3a18;
    box-shadow: inset 0 0 0 2px #b89870, 2px 2px 0 rgba(0,0,0,0.5);
    pointer-events: none;
  }
  .scrollPaper.dipped {
    background: #f0d8a0;
    box-shadow: inset 0 0 0 2px #c8a878, 0 0 8px rgba(255,210,63,0.5), 2px 2px 0 rgba(0,0,0,0.5);
  }
  .waterBasin {
    position: absolute;
    left: 82%; top: 78%;
    width: 44px; height: 26px;
    background: radial-gradient(ellipse at center, #4cd2ff 0%, #1a5c8a 70%, #0a2a4a 100%);
    border: 2px solid #2a1a08;
    border-radius: 50%;
    box-shadow: inset 0 0 6px rgba(0,0,0,0.6), 2px 2px 0 rgba(0,0,0,0.5);
    pointer-events: none;
  }

  .feedback.info { color: var(--teal); border: 2px solid var(--teal); }

  /* Memory-walk activity effects */
  @keyframes stonePlop {
    0%   { transform: translateY(-40px) scale(0.7); opacity: 0; }
    70%  { transform: translateY(4px) scale(1.05); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  @keyframes lanternRise {
    0%   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    20%  { transform: translate(-50%, -60%) scale(1.2); opacity: 1; filter: drop-shadow(0 0 10px var(--gold)); }
    100% { transform: translate(-50%, -260%) scale(0.8); opacity: 0; filter: drop-shadow(0 0 18px var(--gold)); }
  }
  @keyframes pearlFloat {
    0%   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    40%  { transform: translate(-50%, -90%) scale(1.3); opacity: 1; filter: drop-shadow(0 0 12px var(--gold)); }
    100% { transform: translate(-50%, -180%) scale(0.6); opacity: 0; }
  }
  .hotspot.memoryDot.found {
    pointer-events: none;
  }

  /* Star-order puzzle */
  .starHotspot {
    position: absolute;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    color: var(--paper);
    font-size: 18px;
    cursor: pointer;
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.2);
    transform: translate(-50%, -50%);
    transition: transform 0.1s steps(2), color 0.1s steps(2);
  }
  .starHotspot:hover { color: var(--gold); transform: translate(-50%, -50%) scale(1.3); }
  .starHotspot.lit {
    color: var(--gold);
    border-color: var(--gold);
    background: rgba(255,210,63,0.2);
    text-shadow: 0 0 10px var(--gold);
    animation: starLit 0.4s steps(2);
  }
  @keyframes starLit {
    0% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.6); }
    100% { transform: translate(-50%, -50%) scale(1.1); }
  }
  .runeTablet {
    background: #0a0a1a;
    border: 3px solid var(--teal);
    padding: 10px;
    margin-bottom: 8px;
    text-align: center;
    font-size: 14px;
    color: var(--teal);
    letter-spacing: 6px;
  }
  .runeTablet .label {
    color: var(--paper);
    font-size: 8px;
    display: block;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .shakeBad { animation: shake 0.4s steps(4); }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }
  .progressDots { text-align: center; font-size: 10px; color: var(--gold); margin-bottom: 8px; letter-spacing: 4px; }

  /* Reserve heights to prevent layout shift in puzzles */
  #feedback { min-height: 36px; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
  #feedback:empty { border: none; }
  .scene--puzzle .flavor { min-height: 80px; margin-bottom: 10px; }

  .feedback {
    font-size: 10px;
    padding: 6px;
    margin-bottom: 8px;
    text-align: center;
  }
  .feedback.good { color: var(--green); border: 2px solid var(--green); }
  .feedback.bad { color: var(--red); border: 2px solid var(--red); }

  /* SCENE TRANSITIONS */
  .scene-fadeOut { animation: sceneOut 0.18s steps(2) forwards; transform-origin: center; }
  .scene-fadeIn  { animation: sceneIn  0.26s steps(3); transform-origin: center; }
  @keyframes sceneOut {
    from { opacity: 1; transform: scale(1); }
    to   { opacity: 0; transform: scale(0.97); }
  }
  @keyframes sceneIn {
    0%   { opacity: 0; transform: scale(1.03); }
    60%  { opacity: 1; transform: scale(0.99); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Travel overlay — Indiana-Jones style paper map between locations */
  .travelOverlay {
    position: fixed; inset: 0;
    z-index: 200;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0) 30%, rgba(0,0,0,0.55) 100%),
      linear-gradient(135deg, #0a0a23 0%, #1a0a3a 50%, #0a0a23 100%);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    pointer-events: none;
    animation: travelIn 0.22s steps(2) forwards;
  }
  .travelOverlay.exit { animation: travelOut 0.28s steps(2) forwards; }
  @keyframes travelIn  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes travelOut { from { opacity: 1; } to { opacity: 0; } }

  /* The "paper" map */
  .travelMap {
    position: relative;
    width: min(92vw, 640px);
    height: min(50vh, 320px);
    aspect-ratio: 2 / 1;
    background:
      repeating-linear-gradient(0deg, rgba(120,80,30,0.06) 0 1px, transparent 1px 22px),
      repeating-linear-gradient(90deg, rgba(120,80,30,0.06) 0 1px, transparent 1px 22px),
      radial-gradient(ellipse at 30% 30%, rgba(255,220,150,0.18) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 70%, rgba(255,220,150,0.12) 0%, transparent 60%),
      linear-gradient(135deg, #f1d9a4 0%, #e6c080 50%, #c89a55 100%);
    border: 4px solid #000;
    box-shadow:
      0 0 0 2px #5a3a1a,
      8px 8px 0 #000,
      inset 0 0 30px rgba(80,40,10,0.35),
      inset 0 0 60px rgba(80,40,10,0.20);
    image-rendering: pixelated;
    animation: mapPlop 0.3s steps(3) forwards;
    overflow: hidden;
  }
  @keyframes mapPlop {
    from { transform: scale(0.85) rotate(-1deg); opacity: 0; }

  /* Geographically accurate world map */
  .travelMap .travelWorld {
    position: absolute;
    inset: 0;

  .travelMap .travelWorld path {

  /* Compass rose — top-right */

  .travelCompass .s { position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); }
  .travelCompass .e { position: absolute; right: -3px; top: 50%; transform: translateY(-50%); }

  /* Pins (origin/destination) */
  .travelPin {

  .travelPin .marker {

  @keyframes pinDrop {

  .travelPin .label {
    position: absolute;

  /* Dashed route — drawn with SVG */
  .travelRoute {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .travelRoute {
    width: 100%; height: 100%;
  }
  .travelRoute path {
    fill: none;
    stroke: #6b2020;
    stroke-width: 3;
    stroke-linecap: round;
    vector-effect: non-scaling-stroke;

  @keyframes routeStroke {

  /* Plane glides along route */
  .travelMap .travelPlane {
    position: absolute;
    top: 0; left: 0;
    font-size: 22px;
    text-shadow: 3px 3px 0 #000, 0 0 8px #ffd76a;
    pointer-events: none;
    opacity: 0;

  @keyframes planeRide {
    0%   { opacity: 0; offset-distance: 0%; }

    100% { opacity: 1; offset-distance: 100%; }
  }

  /* Banner above the map */
  .travelHeader {
    position: absolute;
    top: -34px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--pink);
    font-size: 10px;
    letter-spacing: 6px;
    text-shadow: 3px 3px 0 #000;

  @keyframes travelHeaderIn {

  }

  /* Dots ticker below the map */
  .travelTicker {
    position: absolute;
    bottom: -34px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--teal);
    font-size: 10px;

    text-shadow: 2px 2px 0 #000;

  }
  @keyframes travelDots {
    0%, 33%   { opacity: 0.4; }

  }

  /* Coin pop */
  .coinPop {
    position: fixed;

    color: var(--gold);

  @keyframes coinFly {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    100% { transform: translate(-50%, -200%) scale(0.8); opacity: 0; }
  }

  /* Ending */
  .endingTitle {
    font-size: 18px; color: var(--pink);
    text-align: center; margin: 20px 0;
    animation: bob 1s steps(2) infinite;
    text-shadow: 4px 4px 0 #000;
  }

  @media (max-width: 600px) {
    .bigTitle { font-size: 18px; letter-spacing: 3px; }
    .panel { padding: 16px; }
    .gameTitle { font-size: 9px; }
    .topbar { font-size: 8px; }
    .flavor { font-size: 9px; }
    button.choice { font-size: 9px; }
  }

  /* ===== AUDIO SETTINGS BAR ===== */
  #audioBar {
    position: fixed;

    display: flex;

  }
  #audioToggleBtn:hover { background: var(--gold); color: var(--bg-deep); }

  #audioPanel {

  .audioToggle.off { background: var(--red);   color: #fff;       border-color: var(--red);   }
  .audioToggle:hover { filter: brightness(1.15); }

  .audioDivider {

</style>

<body>
  <!-- ===== AUDIO SETTINGS BAR ===== -->
  <div id="audioBar">
    <button id="audioToggleBtn" title="Audio Settings" onclick="toggleAudioPanel()">
      <span class="audioIcon" id="audioIcon">🔊</span> SFX
    </button>
    <div id="audioPanel">
      <div class="audioTitle">— AUDIO —</div>
      <div class="audioRow">
        <span class="audioLabel">VOL</span>
        <input type="range" class="audioSlider" id="volSlider"
               min="0" max="1" step="0.05" value="0.2"
               oninput="AudioManager.setMasterVolume(+this.value)">
      </div>
      <hr class="audioDivider">
      <div class="audioRow">
        <span class="audioLabel">MUSIC</span>
        <button class="audioToggle on" id="btnMusic" onclick="AudioManager.toggleMusic()">ON</button>
      </div>
      <div class="audioRow">
        <span class="audioLabel">SFX</span>
        <button class="audioToggle on" id="btnSFX" onclick="AudioManager.toggleSFX()">ON</button>
      </div>
    </div>
  </div>

  <div id="game"></div>

<script>
'use strict';

// =====================================================================
//  AUDIO MANAGER — Penguin Travels
//  SFX: synthesized via Web Audio API (see SFX recipes below)
//  Music: Music/ folder (see PLAYLIST)
// =====================================================================
const AudioManager = (() => {
  // ── SFX synth recipes — every UI sound is generated live with the
  //    Web Audio API. To tweak: edit the functions below. To add a new
  //    sound: add a key here and call playSFX('your_key') from anywhere.
  let _audioCtx = null;

  function _ctx() {
    if (_audioCtx) return _audioCtx;
    const Ctor = window.AudioContext || window.webkitAudioContext;
    if (!Ctor) return null;
    _audioCtx = new Ctor();
    return _audioCtx;
  }

  // Schedule an oscillator note with a short ADSR-ish envelope.
  function _note(ctx, dest, t0, type, freq, dur, peak, sweepTo) {
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (sweepTo !== undefined) {
      osc.frequency.exponentialRampToValueAtTime(Math.max(1, sweepTo), t0 + dur);
    }
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(peak, t0 + Math.min(0.012, dur * 0.2));
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(dest);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  }

  // Short burst of filtered white noise — used for the travel whoosh.
  function _noiseBurst(ctx, dest, t0, dur, peak, freqStart, freqEnd, q) {
    const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.Q.value = q;
    filt.frequency.setValueAtTime(freqStart, t0);
    filt.frequency.exponentialRampToValueAtTime(Math.max(1, freqEnd), t0 + dur);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(peak, t0 + dur * 0.2);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(filt).connect(g).connect(dest);
    src.start(t0);
    src.stop(t0 + dur + 0.02);
  }

  const SFX = {
    // Crisp tactile blip for buttons.
    ui_click(ctx, dest, t) {
      _note(ctx, dest, t, 'triangle', 1100, 0.05, 0.30, 650);
    },
    // Soft airy whoosh for scene/travel transitions.
    travel(ctx, dest, t) {
      _noiseBurst(ctx, dest, t,        0.55, 0.18,  400, 2200, 1.4);
      _noiseBurst(ctx, dest, t + 0.05, 0.45, 0.10, 1800,  500, 1.2);
    },
    // Two ascending blips — coin / fish coin earned.
    coin(ctx, dest, t) {
      _note(ctx, dest, t,         'triangle', 1320, 0.09, 0.28);
      _note(ctx, dest, t + 0.07,  'triangle', 1976, 0.18, 0.26);
    },
    // Three-note rising chime for correct answers / unlocks.
    success(ctx, dest, t) {
      _note(ctx, dest, t,         'triangle', 523.25, 0.18, 0.22);
      _note(ctx, dest, t + 0.10,  'triangle', 659.25, 0.18, 0.22);
      _note(ctx, dest, t + 0.20,  'triangle', 783.99, 0.32, 0.24);
    },
    // Buzzy descending two-tone for wrong answers.
    error(ctx, dest, t) {
      _note(ctx, dest, t,         'square', 220.0, 0.14, 0.18);
      _note(ctx, dest, t + 0.12,  'square', 146.83, 0.22, 0.20);
    },
    // Warm two-note pulse for romantic / heart moments.
    heart(ctx, dest, t) {
      _note(ctx, dest, t,         'sine', 698.46, 0.50, 0.18);
      _note(ctx, dest, t + 0.04,  'sine', 880.00, 0.55, 0.16);
    },
  };

  // ── Music playlist — add/remove tracks here; the player loops through
  //    the list in order forever. Order is randomised once on load so
  //    different sessions feel fresh, but each track plays end-to-end.
  const PLAYLIST = [
    'Music/Tokyo_To_The_Sand.mp3',
    'Music/Captain_of_the_Cloudship.mp3',
    'Music/Latitude_of_Home.mp3',
    'Music/Aurora_of_My_Nights.mp3',
    'Music/Home_Against_The_Freeze.mp3',
    'Music/Polar_Night_Ascent.mp3',
    'Music/Where_the_Stars_Bloom.mp3',
    'Music/This_Silent_Film.mp3',
    'Music/Table_for_Two.mp3',
    'Music/Hickory_and_Home.mp3',
    'Music/Your_Quiet_Orbit.mp3',
	'Music/Jazz_1.mp3',
	'Music/Jazz_2.mp3',
	'Music/Jazz_3.mp3',
	'Music/Jazz_4.mp3',
	'Music/Jazz_5.mp3',
  ];

  // ── Internal state ─────────────────────────────────────────────────
  let _unlocked     = false;
  let _masterVolume = 0.8;
  let _musicEnabled = true;
  let _sfxEnabled   = true;
  let _musicEl      = null;  // single persistent <audio> for music
  let _playOrder    = null;  // shuffled copy of PLAYLIST indices
  let _playIdx      = 0;     // position within _playOrder
  let _started      = false; // becomes true after first track kicks off
  let _errorStreak  = 0;     // consecutive failed tracks — bail after a full pass

  // ── Helpers ────────────────────────────────────────────────────────
  function _setMusicVolume(v) {
    if (_musicEl) _musicEl.volume = Math.max(0, Math.min(1, v));
  }

  function _buildOrder() {
    const idx = PLAYLIST.map((_, i) => i);
    for (let i = idx.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [idx[i], idx[j]] = [idx[j], idx[i]];
    }
    _playOrder = idx;
    _playIdx   = 0;
  }

  function _playTrack(src) {
    // Stop any element that might still be running so we never stack tracks.
    if (_musicEl) {
      try { _musicEl.pause(); } catch (e) {}
      _musicEl.src = '';
      _musicEl = null;
    }

    const el = new Audio(src);
    el.loop    = false;            // playlist advances on ended
    el.volume  = 0;
    el.preload = 'auto';
    el.addEventListener('ended',  () => { _errorStreak = 0; _advance(); });
    el.addEventListener('playing', () => { _errorStreak = 0; });
    // If the file 404s or fails to decode, skip to the next one rather
    // than stalling the whole playlist. Bail after one full failed pass.
    el.addEventListener('error', () => {
      if (_musicEl !== el) return;
      if (++_errorStreak >= PLAYLIST.length) { console.warn('AudioManager: all playlist tracks failed to load'); return; }
      _advance();
    });
    _musicEl = el;
    el.play().catch(() => {});

    const targetVol = _masterVolume * 0.65;
    const fadeIn = setInterval(() => {
      if (!_musicEl || _musicEl !== el) { clearInterval(fadeIn); return; }
      el.volume = Math.min(targetVol, el.volume + 0.04);
      if (el.volume >= targetVol) clearInterval(fadeIn);
    }, 60);
  }

  function _advance() {
    if (!PLAYLIST.length) return;
    if (!_playOrder) _buildOrder();
    _playIdx = (_playIdx + 1) % _playOrder.length;
    if (_playIdx === 0) _buildOrder();   // reshuffle each loop around
    if (!_unlocked || !_musicEnabled) return;
    _playTrack(PLAYLIST[_playOrder[_playIdx]]);
  }

  function _startPlaylist() {
    if (!PLAYLIST.length) return;
    if (!_unlocked || !_musicEnabled) return;
    if (!_playOrder) _buildOrder();
    _started = true;
    _playTrack(PLAYLIST[_playOrder[_playIdx]]);
  }

  // ── Public API ─────────────────────────────────────────────────────
  return {
    // Must be called on the very first user gesture (character select).
    // Nothing plays before this — satisfies browser autoplay policy.
    unlock() {
      if (_unlocked) return;
      _unlocked = true;
    },

    // SFX: synthesized live in the Web Audio API so they never share an
    // element or buffer with the music track and can never interrupt it.
    playSFX(type) {
      if (!_unlocked || !_sfxEnabled) return;
      const recipe = SFX[type];
      if (!recipe) return;
      const ctx = _ctx();
      if (!ctx) return;
      if (ctx.state === 'suspended') ctx.resume().catch(() => {});
      const master = ctx.createGain();
      master.gain.value = _masterVolume;
      master.connect(ctx.destination);
      recipe(ctx, master, ctx.currentTime + 0.005);
    },

    // Called from renderScene / renderTitle.
    // Kicks off the playlist on the first scene render; afterwards it
    // does nothing so navigation never interrupts the current track.
    playMusicForScene(_key) {
      if (!_started) _startPlaylist();
    },

    // Skip to the next track in the playlist (handy for testing).
    nextTrack() { _advance(); },

    // Volume slider
    setMasterVolume(v) {
      _masterVolume = v;
      _setMusicVolume(v * 0.65);
      // Update toggle icon
      const icon = document.getElementById('audioIcon');
      if (icon) icon.textContent = v < 0.01 ? '🔇' : v < 0.4 ? '🔉' : '🔊';
    },

    // Music on/off toggle
    toggleMusic() {
      _musicEnabled = !_musicEnabled;
      const btn = document.getElementById('btnMusic');
      if (btn) { btn.textContent = _musicEnabled ? 'ON' : 'OFF'; btn.className = 'audioToggle ' + (_musicEnabled ? 'on' : 'off'); }
      if (!_musicEnabled) {
        if (_musicEl) { try { _musicEl.pause(); } catch (e) {} }
      } else if (_unlocked) {
        if (_musicEl && _musicEl.paused && _musicEl.src) {
          _musicEl.play().catch(() => {});
        } else if (!_started) {
          _startPlaylist();
        }
      }
    },

    // SFX on/off toggle
    toggleSFX() {
      _sfxEnabled = !_sfxEnabled;
      const btn = document.getElementById('btnSFX');
      if (btn) { btn.textContent = _sfxEnabled ? 'ON' : 'OFF'; btn.className = 'audioToggle ' + (_sfxEnabled ? 'on' : 'off'); }
    },
  };
})();

// Audio settings panel show/hide
function toggleAudioPanel() {
  const panel = document.getElementById('audioPanel');
  if (panel) panel.classList.toggle('open');
}

// Convenience shorthand used throughout the game
function playSFX(type) { AudioManager.playSFX(type); }


const State = {
  coins: 0,
  visited: new Set(),
  stops: 0,
  current: 'title',
  // Last real travel destination the player physically arrived at.
  // Used as the origin pin for the next travel transition so the route
  // chains current → next instead of always restarting from Antarctica.
  lastLocation: 'antarctica',
  flags: {},
  player: 'porky', // 'porky' | 'squid'
  inventory: [],
  selectedItem: null,
  vibes: { romantic: 0, silly: 0, sentimental: 0, adventure: 0 },
  // Hidden personality stats shaped by every choice
  stats: { adventurous: 0, curious: 0, social: 0, cautious: 0 },
};

// =============== SCENE ART RENDERERS ==================
function art_antarctica() {
  // ♥ generated here — trigger heart SFX
  playSFX('heart');
  let stars = '';
  for (let i = 0; i < 8; i++) stars += `<div class="snowflake" style="left:${Math.random()*100}%; animation-delay:${Math.random()*4}s;">❄</div>`;
  return `<div class="sceneArt bg-ice">
    ${stars}
    <div class="igloo"></div>
    <div class="penguinPair" style="bottom:6px;">
      <div class="penguin"><div class="body"></div></div>
      <div class="heart" style="top:0;">♥</div>
      <div class="penguin izzy"><div class="body"></div></div>
    </div>
  </div>`;
}
function art_tokyo() {
  return `<div class="sceneArt bg-tokyo">
    <div class="star" style="top:10%;left:15%;">✦</div>
    <div class="star" style="top:8%;left:75%;">✦</div>

    <div class="torii"></div>

  </div>`;
}
function art_paris() {
  return `<div class="sceneArt bg-paris">
    <div class="moon"></div>
    <div class="star" style="top:15%;left:20%;">✦</div>
    <div class="star" style="top:25%;left:70%;">✦</div>
    <div class="eiffel"></div>
    <div class="penguinPair" style="bottom:6px;left:15%;transform:none;">
      <div class="penguin izzy"><div class="body"></div></div>
    </div>
  </div>`;
}
function art_egypt() {
  return `<div class="sceneArt bg-egypt">
    <div class="sun"></div>
    <div class="pyramid"></div>
    <div class="sphinx">𓁢</div>
    <div class="penguinPair" style="bottom:50px;left:75%;transform:none;">
      <div class="penguin"><div class="body"></div></div>
    </div>
  </div>`;
}
function art_amazon() {
  return `<div class="sceneArt bg-amazon">
    <div class="tree" style="left:10%;"></div>

// Character-aware text swap
function P(porkyText, squidText) { return State.player === 'porky' ? porkyText : squidText; }
function me() { return State.player === 'porky' ? 'Mr Porky' : 'Squid'; }
function partner() { return State.player === 'porky' ? 'Squid' : 'Mr Porky'; }
// Smart mid-journey routing: first mid-stop → choose2b, second → choose3
function midNext() { return State.visited.has('choose2b') ? 'choose3' : 'choose2b'; }
function addCoins(n) {
  State.coins += n;
  playSFX('coin');   // 🪙 coin earned
  renderTopBar();
  popCoins(n);
}
function popCoins(n) {
  const el = document.createElement('div');
  el.className = 'coinPop';
  el.textContent = '+' + n + ' 🪙';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}
function countStop() {
  State.stops += 1;
  renderTopBar();
}
function filterChoices(arr) {
  return arr.filter(c => !c.requires || c.requires());
}

// ── Stat helpers ──────────────────────────────────────────────────────
function addStat(name, n) {
  n = n || 1;
  if (!State.stats) State.stats = { adventurous: 0, curious: 0, social: 0, cautious: 0 };
  if (name in State.stats) State.stats[name] += n;
}
// Returns flavor text based on the player's dominant stat.
function statFlavor(opts) {
  var s = State.stats || {};
  var best = Math.max(s.adventurous||0, s.curious||0, s.social||0, s.cautious||0);
  if (best === 0) return opts.def || opts.adv || opts.cur || opts.soc || opts.cau || '';
  if ((s.adventurous||0) >= best && opts.adv) return opts.adv;
  if ((s.curious    ||0) >= best && opts.cur) return opts.cur;
  if ((s.social     ||0) >= best && opts.soc) return opts.soc;
  if ((s.cautious   ||0) >= best && opts.cau) return opts.cau;
  return opts.def || opts.adv || opts.cur || opts.soc || opts.cau || '';
}
// True when a stat meets the threshold — used to unlock special options.
function statUnlocked(name, threshold) {
  threshold = threshold || 3;
  return (State.stats && State.stats[name] || 0) >= threshold;
}

function addVibe(kind, n) {
  if (!State.vibes) State.vibes = { romantic: 0, silly: 0, sentimental: 0, adventure: 0 };
  if (kind in State.vibes) State.vibes[kind] += (n || 1);
}

// Default to 'romantic' (Pebble) on ties — keeps the canonical ending as the gentle fallback.
function dominantVibe() {
  const v = State.vibes;
  let best = 'romantic';
  let bestScore = v.romantic;
  if (v.silly       > bestScore) { best = 'silly';       bestScore = v.silly; }
  if (v.sentimental > bestScore) { best = 'sentimental'; bestScore = v.sentimental; }
  if (v.adventure   > bestScore) { best = 'adventure';   bestScore = v.adventure; }
  return best;
}

function endingScreen({ title, bodyPorky, bodySquid, gradesPorky, gradesSquid }) {
  const isSquid = State.player === 'squid';
  const body = isSquid ? bodySquid : bodyPorky;
  const grades = isSquid ? gradesSquid : gradesPorky;
  const grade = State.coins >= 25 ? grades[0]
              : State.coins >= 15 ? grades[1]
              : State.coins >= 8  ? grades[2]
              :                     grades[3];
  const ratingLabel = isSquid ? 'Squid rating' : 'Mr Porky rating';
  return `<div class="endingTitle">${title}</div>
    ${body}<br><br>
    <span style="color:var(--gold);">Final Fish Coins: ${State.coins}</span><br>
    <span style="color:var(--teal);">Stops visited: ${State.stops}</span><br>
    <span style="color:var(--pink);">${ratingLabel}: ${grade}</span><br><br>
    <span style="font-size:9px;color:var(--paper);">Made with ♥ — Santo Loves Izzy. Forever and always.</span>`;
}

function renderPuzzle(container, p) {
  if (p.kind === 'discover-sequence') return renderDiscoverSequence(container, p);
  if (p.kind === 'star-order') return renderStarOrder(container, p);
  if (p.kind === 'escape-room') return renderEscapeRoom(container, p);
  if (p.kind === 'memory-walk') return renderMemoryWalk(container, p);

  const box = document.createElement('div');
  box.className = 'puzzleBox';
  box.innerHTML = `
    <p>${p.prompt}</p>
    <input class="puzzleInput" id="puzInput" autocomplete="off" />
    <div id="feedback"></div>
  `;
  container.appendChild(box);

  const submit = document.createElement('button');
  submit.className = 'choice puzzle';
  submit.innerHTML = '✔ SUBMIT';
  container.appendChild(submit);

  const hint = document.createElement('button');
  hint.className = 'choice';
  hint.innerHTML = '💡 Hint';
  container.appendChild(hint);

  const skip = document.createElement('button');
  skip.className = 'choice';
  skip.innerHTML = '🏳 Give up & continue';
  container.appendChild(skip);

  let attempts = 0;
  const input = document.getElementById('puzInput');
  input.focus();

  const check = () => {
    attempts++;
    const fb = document.getElementById('feedback');
    if (p.validate(input.value)) {
      playSFX('success');
      fb.className = 'feedback good'; fb.textContent = '★ CORRECT! ★';
      setTimeout(() => goTo(p.onWin), 800);
    } else {
      playSFX('error');
      fb.className = 'feedback bad';
      fb.textContent = attempts >= 3 ? 'Try the hint, my love.' : '✗ Not quite. Try again!';
    }
  };
  submit.onclick = check;
  input.onkeydown = (e) => { if (e.key === 'Enter') check(); };
  hint.onclick = () => {
    const fb = document.getElementById('feedback');
    fb.className = 'feedback';
    fb.style.color = 'var(--teal)';
    fb.style.border = '2px solid var(--teal)';
    fb.textContent = p.hint || '(no hint, you got this!)';
  };
  skip.onclick = () => goTo(p.onLose);
}

// === Cube-Escape style: discover symbols, then place in sequence ===
function renderDiscoverSequence(container, p) {
  const left = document.getElementById('puzzleLeft');
  const flavorEl = left.querySelector('.flavor');

  const wrap = document.createElement('div');
  wrap.className = `escapeScene ${p.sceneClass || ''}`;
  wrap.innerHTML = p.sceneArt || '';
  p.hotspots.forEach((h, idx) => {
    const dot = document.createElement('div');
    dot.className = 'hotspot';
    dot.style.left = h.x; dot.style.top = h.y;
    dot.style.fontSize = (h.size || 28) + 'px';
    dot.style.opacity = '0.001';
    dot.title = '';
    dot.dataset.idx = idx;
    dot.textContent = h.symbol;
    dot.onclick = () => discoverHotspot(idx);
    wrap.appendChild(dot);
  });
  left.insertBefore(wrap, flavorEl);

  const discovered = document.createElement('div');
  discovered.className = 'discoveredBar';
  discovered.id = 'discoveredBar';
  discovered.innerHTML = '<span class="empty">FOUND SIGILS WILL APPEAR HERE</span>';
  container.appendChild(discovered);

  const pad = document.createElement('div');
  pad.className = 'slotPad';
  pad.id = 'slotPad';
  for (let i = 1; i <= p.hotspots.length; i++) {
    const s = document.createElement('div');
    s.className = 'slot';
    s.dataset.num = i;
    s.dataset.slotIdx = i;
    s.onclick = () => clearSlot(i);
    pad.appendChild(s);
  }
  container.appendChild(pad);

  const fb = document.createElement('div');
  fb.id = 'feedback';
  container.appendChild(fb);

  const submit = document.createElement('button');
  submit.className = 'choice puzzle';
  submit.innerHTML = '✔ CHECK SIGILS';
  submit.onclick = () => checkSequence(p);
  container.appendChild(submit);

  const reset = document.createElement('button');
  reset.className = 'choice';
  reset.innerHTML = '↻ Clear slots';
  reset.onclick = () => {
    document.querySelectorAll('#slotPad .slot').forEach(s => { s.classList.remove('filled'); s.textContent = ''; });
    document.querySelectorAll('#discoveredBar .symBtn').forEach(b => { b.disabled = false; });
  };
  container.appendChild(reset);

  const hint = document.createElement('button');
  hint.className = 'choice';
  hint.innerHTML = '💡 Hint';
  hint.onclick = () => {
    const fb = document.getElementById('feedback');
    fb.className = 'feedback';
    fb.style.color = 'var(--teal)';
    fb.style.border = '2px solid var(--teal)';
    fb.textContent = p.hint;
  };
  container.appendChild(hint);

  const skip = document.createElement('button');
  skip.className = 'choice';
  skip.innerHTML = '🏳 Give up & continue';
  skip.onclick = () => goTo(p.onLose);
  container.appendChild(skip);

  // store puzzle data on element for handlers
  wrap.__puzzle = p;
  wrap.__found = new Set();
}

function discoverHotspot(idx) {
  const wrap = document.querySelector('.escapeScene');
  if (!wrap) return;
  const p = wrap.__puzzle;
  const found = wrap.__found;
  if (found.has(idx)) return;
  found.add(idx);

  const dot = wrap.querySelector(`.hotspot[data-idx="${idx}"]`);
  dot.style.opacity = '1';
  dot.classList.add('found');

  const h = p.hotspots[idx];
  const bar = document.getElementById('discoveredBar');
  const empty = bar.querySelector('.empty');
  if (empty) empty.remove();

  const btn = document.createElement('button');
  btn.className = 'symBtn';
  btn.dataset.symbol = h.symbol;
  btn.dataset.pos = h.pos;
  btn.title = h.label;
  btn.innerHTML = `${h.symbol}<span class="pos">POS ${h.pos}</span>`;
  btn.onclick = () => placeSymbol(btn);
  bar.appendChild(btn);

  const fb = document.getElementById('feedback');
  if (fb) {
    fb.className = 'feedback';
    fb.style.color = 'var(--gold)';
    fb.style.border = '2px solid var(--gold)';
    fb.textContent = `Found ${h.label}: ${h.symbol} (position ${h.pos})`;
  }
}

function placeSymbol(btn) {
  const slots = document.querySelectorAll('#slotPad .slot');
  for (const s of slots) {
    if (!s.classList.contains('filled')) {
      s.classList.add('filled');
      s.textContent = btn.dataset.symbol;
      s.dataset.symbol = btn.dataset.symbol;
      s.dataset.pos = btn.dataset.pos;
      btn.disabled = true;
      return;
    }
  }
}

function clearSlot(num) {
  const slots = document.querySelectorAll('#slotPad .slot');
  const s = slots[num - 1];
  if (!s.classList.contains('filled')) return;
  const sym = s.dataset.symbol;
  s.classList.remove('filled');
  s.textContent = '';
  delete s.dataset.symbol;
  delete s.dataset.pos;
  document.querySelectorAll(`#discoveredBar .symBtn[data-symbol="${sym}"]`).forEach(b => b.disabled = false);
}

function checkSequence(p) {
  const slots = document.querySelectorAll('#slotPad .slot');
  let allFilled = true;
  let allCorrect = true;
  slots.forEach((s, i) => {
    if (!s.classList.contains('filled')) allFilled = false;
    else if (parseInt(s.dataset.pos) !== i + 1) allCorrect = false;
  });
  const fb = document.getElementById('feedback');
  if (!allFilled) {
    fb.className = 'feedback bad';
    fb.textContent = 'Fill every slot first, my love.';
    return;
  }
  if (allCorrect) {
    playSFX('success');
    fb.className = 'feedback good';
    fb.textContent = '★ THE SLABS GLOW! THE PATH OPENS! ★';
    setTimeout(() => goTo(p.onWin), 900);
  } else {
    playSFX('error');
    fb.className = 'feedback bad';
    fb.textContent = '✗ The Sphinx hisses. Wrong order!';
    document.getElementById('slotPad').classList.add('shakeBad');
    setTimeout(() => document.getElementById('slotPad').classList.remove('shakeBad'), 400);
  }
}

function clickStar(id) {
  const wrap = document.querySelector('.escapeScene');
  if (!wrap) return;
  const p = wrap.__puzzle;
  const expected = p.order[wrap.__progress];
  const star = wrap.querySelector(`.starHotspot[data-id="${id}"]`);
  const fb = document.getElementById('feedback');

  if (id === expected) {
    star.classList.add('lit');
    wrap.__progress++;
    updateStarProgress(wrap.__progress, p.order.length);
    if (wrap.__progress === p.order.length) {
      playSFX('success');
      fb.className = 'feedback good';
      fb.textContent = '★ THE CONSTELLATION IS COMPLETE! ★';
      setTimeout(() => goTo(p.onWin), 900);
    } else {
      fb.className = 'feedback';
      fb.style.color = 'var(--gold)';
      fb.style.border = '2px solid var(--gold)';
      fb.textContent = `Good! ${wrap.__progress} of ${p.order.length} lit.`;
    }
  } else {
    playSFX('error');
    fb.className = 'feedback bad';
    fb.textContent = '✗ Wrong star! The pattern resets.';
    wrap.classList.add('shakeBad');
    setTimeout(() => { wrap.classList.remove('shakeBad'); resetStars(); }, 500);
  }
}

function updateStarProgress(done, total) {
  const dots = document.getElementById('starProgress');
  if (!dots) return;
  let s = '';
  for (let i = 0; i < total; i++) s += (i < done ? '●' : '○') + ' ';
  dots.textContent = s.trim();
}

function resetStars() {
  const wrap = document.querySelector('.escapeScene');
  if (!wrap) return;
  wrap.__progress = 0;
  wrap.querySelectorAll('.starHotspot.lit').forEach(s => s.classList.remove('lit'));
  const p = wrap.__puzzle;
  updateStarProgress(0, p.order.length);
}

function addToInventory(id, symbol, label, opts) {
  if (State.inventory.some(i => i.id === id)) return;
  State.inventory.push(Object.assign({ id, symbol, label }, opts || {}));
  rerenderInventory();
}
function revealSymbol(id, symbol, pos, label) {
  addToInventory(id, symbol, label || id, { pos });
}
function hasItem(id) {
  return State.inventory.some(i => i.id === id);
}
function showFeedback(msg, kind) {
  const fb = document.getElementById('feedback');
  if (!fb) return;
  if (!msg) {
    fb.className = '';
    fb.textContent = '';
    fb.removeAttribute('style');
    return;
  }
  fb.removeAttribute('style');
  if (kind === 'good') fb.className = 'feedback good';
  else if (kind === 'bad') fb.className = 'feedback bad';
  else if (kind === 'info') fb.className = 'feedback info';
  else fb.className = 'feedback';
  fb.textContent = msg;
}

function updateSundialVisual(rotation) {
  const mount = document.querySelector('.sundialMount');
  if (!mount) return;
  const svg = mount.querySelector('svg');
  if (!svg) return;

  // hour: rotation 0 starts at 8, each click advances by 1 (loops 1..12)
  const hour = ((rotation + 7) % 12) + 1;
  const isMidday = hour === 12;

  const angle = (hour % 12) * 30 * Math.PI / 180;
  const tipX = 50 + 36 * Math.sin(angle);
  const tipY = 50 - 36 * Math.cos(angle);

  let ticks = '';
  for (let h = 1; h <= 12; h++) {
    const a = (h % 12) * 30 * Math.PI / 180;
    const ox = 50 + 40 * Math.sin(a);
    const oy = 50 - 40 * Math.cos(a);
    const ix = 50 + 33 * Math.sin(a);
    const iy = 50 - 33 * Math.cos(a);
    const isMajor = h === 12 || h === 3 || h === 6 || h === 9;
    const lit = h === hour;
    const stroke = lit ? '#ffd23f' : (isMajor ? '#8a6a3a' : '#5a4a2a');
    const w = lit ? 2.5 : (isMajor ? 2 : 1.5);
    ticks += `<line x1="${ix}" y1="${iy}" x2="${ox}" y2="${oy}" stroke="${stroke}" stroke-width="${w}" stroke-linecap="round"/>`;
  }

  const noon = isMidday ? '#ffd23f' : '#8a6a3a';
  svg.innerHTML = `
    <circle cx="50" cy="50" r="44" fill="#3a2a10" stroke="#6b4a1a" stroke-width="3"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="#2a1a08" stroke-width="1"/>
    <text x="50" y="22" text-anchor="middle" font-size="9" fill="${noon}" font-family="monospace" font-weight="bold">12</text>
    <text x="50" y="86" text-anchor="middle" font-size="6" fill="#5a4a2a" font-family="monospace">6</text>
    <text x="86" y="53" text-anchor="middle" font-size="6" fill="#5a4a2a" font-family="monospace">3</text>
    <text x="14" y="53" text-anchor="middle" font-size="6" fill="#5a4a2a" font-family="monospace">9</text>
    <g class="ticks">${ticks}</g>
    <line class="shadow" x1="50" y1="50" x2="${tipX}" y2="${tipY}" stroke="${isMidday ? '#ffd23f' : '#ff9f4a'}" stroke-width="3" stroke-linecap="round"/>
    <rect x="48" y="46" width="4" height="14" fill="#c98a3a" stroke="#000" stroke-width="0.5"/>
    <circle cx="50" cy="50" r="3" fill="#ffd23f"/>
  `;

  if (isMidday) {
    svg.style.filter = 'drop-shadow(0 0 10px #ffd23f) drop-shadow(0 0 18px #ff9f4a)';
  } else {
    svg.style.filter = 'drop-shadow(0 0 4px #ff9f4a)';
  }
}

function rerenderEscapeHotspots() {
  const wrap = document.getElementById('escapeRoomScene');
  if (!wrap) return;
  const p = wrap.__puzzle;
  wrap.querySelectorAll('.hotspot, .hotspotOverlay').forEach(h => h.remove());
  p.hotspots.forEach(h => {
    if (h.visibleIf && !h.visibleIf()) return;
    // Large transparent overlay hotspots (wall, sundial)
    if (h.id === 'wall') {
      const ov = document.createElement('div');
      ov.className = 'hotspotOverlay';
      ov.style.left = '0';
      ov.style.top = '0';
      ov.style.width = '30%';
      ov.style.height = '82%';
      ov.title = h.label;
      ov.dataset.hotspotId = h.id;
      ov.onclick = () => handleEscapeHotspot(h);
      wrap.appendChild(ov);
      return;
    }
    if (h.id === 'sundial') {
      const ov = document.createElement('div');
      ov.className = 'hotspotOverlay silent';
      ov.style.left = '74%';
      ov.style.top = '34%';
      ov.style.width = '94px';
      ov.style.height = '94px';
      ov.title = h.label;
      ov.dataset.hotspotId = h.id;
      ov.onclick = () => handleEscapeHotspot(h);
      wrap.appendChild(ov);
      return;
    }
    if (h.id === 'sundialCheck') {
      const btn = document.createElement('div');
      btn.className = 'sundialCheckBtn';
      btn.textContent = '✓ LOCK DIAL';
      btn.title = h.label;
      btn.dataset.hotspotId = h.id;
      btn.onclick = () => handleEscapeHotspot(h);
      wrap.appendChild(btn);
      return;
    }
    if (h.id === 'cauldron') {
      const ov = document.createElement('div');
      ov.className = 'hotspotOverlay silent';
      ov.style.left = '44%';
      ov.style.top = '56%';
      ov.style.width = '120px';
      ov.style.height = '94px';
      ov.title = h.label;
      ov.dataset.hotspotId = h.id;
      ov.onclick = () => handleEscapeHotspot(h);
      wrap.appendChild(ov);
      return;
    }
    const dot = document.createElement('div');
    dot.className = 'hotspot';
    dot.style.left = h.x;
    dot.style.top = h.y;
    dot.style.fontSize = (h.size || 28) + 'px';
    dot.style.opacity = '1';
    dot.title = h.label;
    dot.dataset.hotspotId = h.id;
    dot.textContent = h.symbol;
    if (h.type === 'interact' && h.requires && !hasItem(h.requires)) {
      dot.classList.add('dusty');
    }
    dot.onclick = () => handleEscapeHotspot(h);
    wrap.appendChild(dot);
  });
}

function handleEscapeHotspot(h) {
  if (h.type === 'collect') {
    if (h.onUse) h.onUse();
    rerenderEscapeHotspots();
    return;
  }
  // interact
  if (h.requires) {
    if (State.selectedItem === h.requires) {
      if (h.onUse) h.onUse();
      State.selectedItem = null;
      rerenderEscapeHotspots();
      rerenderInventory();
    } else if (hasItem(h.requires)) {
      const item = State.inventory.find(i => i.id === h.requires);
      showFeedback(`Select the ${item.label} from your inventory first, then click here.`, 'bad');
    } else {
      showFeedback(h.failMessage || 'You might need a tool for this.', 'bad');
    }
  } else {
    if (h.onUse) h.onUse();
    rerenderEscapeHotspots();
  }
}

function rerenderInventory() {
  const bar = document.getElementById('discoveredBar');
  if (!bar) return;
  bar.innerHTML = '';
  if (State.inventory.length === 0) {
    bar.innerHTML = '<span class="empty">INVENTORY — TOOLS &amp; SIGILS APPEAR HERE</span>';
    return;
  }
  // Tools first, then symbols
  const tools = State.inventory.filter(i => !i.pos);
  const syms = State.inventory.filter(i => i.pos);

  tools.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'symBtn tool';
    btn.dataset.toolId = item.id;
    if (State.selectedItem === item.id) btn.classList.add('selected');
    btn.innerHTML = `${item.symbol}<span class="toolTag">${item.label.toUpperCase()}</span>`;
    btn.title = item.label;
    btn.onclick = () => {
      State.selectedItem = (State.selectedItem === item.id) ? null : item.id;
      rerenderInventory();
      if (State.selectedItem) {
        showFeedback(`${item.label} selected — click on something to use it.`, 'info');
      } else {
        showFeedback('Deselected.', '');
      }
    };
    bar.appendChild(btn);
  });

  syms.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'symBtn';
    btn.dataset.symbol = item.symbol;
    btn.dataset.pos = item.pos;
    btn.title = item.label;
    btn.innerHTML = `${item.symbol}<span class="pos">POS ${item.pos}</span>`;
    const placed = Array.from(document.querySelectorAll('#slotPad .slot.filled'))
      .some(s => s.dataset.symbol === item.symbol);
    if (placed) btn.disabled = true;
    btn.onclick = () => placeSymbol(btn);
    bar.appendChild(btn);
  });
}

  });

function discoverMemory(idx) {
  const wrap = document.getElementById('memoryWalkScene');
  if (!wrap) return;
  const p = wrap.__puzzle;
  const found = wrap.__found;
  if (found.has(idx)) return;
  found.add(idx);

  const h = p.hotspots[idx];
  const dot = wrap.querySelector(`.hotspot[data-idx="${idx}"]`);
  if (dot) dot.classList.add('found');

  const memory = (typeof h.memory === 'function') ? h.memory() : h.memory;
  showFeedback(memory, 'good');

  if (p.onClick) p.onClick(h, idx);

  const dots = document.getElementById('memoryProgress');
  if (dots) {
    let s = '';
    for (let i = 0; i < p.hotspots.length; i++) s += (found.has(i) ? '●' : '○') + ' ';
    dots.textContent = s.trim();
  }

  if (found.size === p.hotspots.length) {
    setTimeout(() => {
      showFeedback(p.completeMessage || 'The moment crystallizes.', 'good');
      const btn = document.getElementById('memoryContinue');
      if (btn) {
        btn.style.display = '';
        btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }
    }, 1100);
  }
}
