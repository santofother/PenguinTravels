function travelLabel(key) {
  if (TRAVEL_LABELS[key]) return TRAVEL_LABELS[key];
  const sc = Scenes[key];
  if (sc && sc.name) return sc.name.split(/[-—–]/)[0].trim();
  return key.toUpperCase();
}

// Map any scene key (including sub-scenes like "paris_tower" or "amazon_r2")
// back to its travel root so the transition starts from where the player
// actually is, not always from Antarctica.
function resolveTravelRoot(sceneKey) {
  if (!sceneKey) return 'antarctica';
  if (TRAVEL_SCENES.has(sceneKey)) return sceneKey;
  for (const k of TRAVEL_SCENES) {
    if (sceneKey === k || sceneKey.startsWith(k + '_')) return k;
  }
  return 'antarctica';
}

function playTravelTransition(destKey, done) {
  playSFX('travel');   // ✈ travel sound
  // Origin = wherever the player physically is right now.
  // Prefer the explicit lastLocation tracker (handles hub/choice scenes like
  // 'choose2' that aren't tied to any geography). Fall back to deriving from
  // State.current for safety.
  const fromKey = LOCATION_COORDS[State.lastLocation]
    ? State.lastLocation
    : resolveTravelRoot(State.current);
  const fromLabel = travelLabel(fromKey);
  const destLabel = travelLabel(destKey);
  // Remember the new arrival so the *next* trip departs from here, not Antarctica.
  State.lastLocation = destKey;

  // Pin positions from real lat/lon (% within the equirectangular world map).
  const fromPos = locToMapPct(fromKey);
  const toPos   = locToMapPct(destKey);
  const x1 = fromPos.x, y1 = fromPos.y;
  const x2 = toPos.x,   y2 = toPos.y;
  // Gentle bow perpendicular to the direct line (consistent travel-map arc).
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.hypot(dx, dy) || 1;
  const bow = Math.min(14, Math.max(4, len * 0.18));
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  // Bow always to the "upper" side of travel direction (toward smaller y when possible).
  const sign = (dx >= 0) ? -1 : 1;
  const cx = mx + sign * (-dy / len) * bow;
  const cy = my + sign * ( dx / len) * bow;
  const pathD = `M ${x1} ${y1} Q ${cx} ${cy}, ${x2} ${y2}`;
  const approxLen = (Math.hypot(x2 - x1, y2 - y1) * 1.3).toFixed(1);

  const overlay = document.createElement('div');
  overlay.className = 'travelOverlay';
  overlay.innerHTML = `
    <div class="travelMap">
      <div class="travelHeader">— ✈ DEPARTING ✈ —</div>
      ${WORLD_MAP_SVG}
      <div class="travelCompass">
        <div class="rose">✦</div>
        <div class="n">N</div>
        <div class="s">S</div>
        <div class="e">E</div>
        <div class="w">W</div>
      </div>
      <svg class="travelRoute" viewBox="0 0 100 100" preserveAspectRatio="none">
        <path d="${pathD}" pathLength="${approxLen}" style="stroke-dasharray:${approxLen};stroke-dashoffset:${approxLen};animation:routeStroke 1.1s linear 0.55s forwards;"/>
      </svg>
      <div class="travelPlane">✈ 🐧</div>
      <div class="travelPin origin" style="left:${x1}%;top:${y1}%;">
        <div class="marker">📍</div>
        <div class="label">${fromLabel}</div>
      </div>
      <div class="travelPin dest" style="left:${x2}%;top:${y2}%;">
        <div class="marker">📌</div>
        <div class="label">${destLabel}</div>
      </div>
      <div class="travelTicker">. . .</div>
    </div>
  `;
  document.body.appendChild(overlay);

  // Build a pixel-accurate offset-path for the plane after layout.
  requestAnimationFrame(() => {
    const map = overlay.querySelector('.travelMap');
    if (!map) return;
    const w = map.clientWidth, h = map.clientHeight;
    const px = (p) => (w * p / 100).toFixed(1);
    const py = (p) => (h * p / 100).toFixed(1);
    const planePath = `M ${px(x1)} ${py(y1)} Q ${px(cx)} ${py(cy)}, ${px(x2)} ${py(y2)}`;
    const plane = overlay.querySelector('.travelPlane');
    if (plane) {
      plane.style.offsetPath = `path('${planePath}')`;
      plane.style.offsetRotate = 'auto';
      plane.style.animation = 'planeRide 1.1s linear 0.55s forwards';
    }
  });

  // Scene swap mid-flight, after the plane has landed.
  setTimeout(() => { done(); }, 1750);
  setTimeout(() => {
    overlay.classList.add('exit');
    setTimeout(() => { overlay.remove(); _transitionLock = false; }, 280);
  }, 1950);
}

function playFadeTransition(done) {
  playSFX('travel');   // scene-change whoosh
  const panel = document.querySelector('.panel');
  if (!panel) { done(); _transitionLock = false; return; }
  panel.classList.add('scene-fadeOut');
  setTimeout(() => {
    done();
    const newPanel = document.querySelector('.panel');
    if (newPanel) {
      newPanel.classList.add('scene-fadeIn');
      setTimeout(() => newPanel.classList.remove('scene-fadeIn'), 280);
    }
    _transitionLock = false;
  }, 190);
}

function goTo(key) {
  playSFX('ui_click');   // 🖱 button press
  if (key === 'title') {
    if (_transitionLock) return;
    _transitionLock = true;
    playFadeTransition(() => renderTitle());
    return;
  }
  // Meta-scenes (onEnter routers like 'restart') run inline so nested goTo isn't blocked.
  const sc = Scenes[key];
  if (sc && sc.onEnter) { sc.onEnter(); return; }
  if (_transitionLock) return;
  _transitionLock = true;
  const isTravel = TRAVEL_SCENES.has(key) && State.current !== key;
  if (isTravel) {
    playTravelTransition(key, () => renderScene(key));
  } else {
    playFadeTransition(() => renderScene(key));
  }
}

// === BOOT ===
renderTitle();
</script>
